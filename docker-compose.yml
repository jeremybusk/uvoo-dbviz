services:
  uvoo-dbviz:
    image: ${DBVIZ_IMAGE:-uvoo-dbviz:local}
    build: .
    depends_on:
      clickhouse:
        condition: service_healthy
      clickhouse-seed:
        condition: service_completed_successfully
      keycloak:
        condition: service_started
      postgrest:
        condition: service_started
    ports:
      - "${DBVIZ_BIND_ADDR:-0.0.0.0}:${DBVIZ_HTTP_PORT:-8080}:8080"
    environment:
      DBVIZ_ADDR: :8080
      DBVIZ_PUBLIC_URL: http://${DBVIZ_PUBLIC_HOST:-localhost}:8080
      DBVIZ_WEB_ROOT: /app/web/dist
      DBVIZ_AUTH_DEV_MODE: ${DBVIZ_AUTH_DEV_MODE:-true}
      DBVIZ_CLICKHOUSE_URL: http://clickhouse:8123
      DBVIZ_CLICKHOUSE_PASSWORD: ${DBVIZ_CLICKHOUSE_PASSWORD:-clickhouse}
      DBVIZ_SECRET_CLICKHOUSE_DEFAULT: ${DBVIZ_CLICKHOUSE_PASSWORD:-clickhouse}
      DBVIZ_CLICKHOUSE_DATABASE: default
      DBVIZ_POSTGREST_URL: http://postgrest:3000
      DBVIZ_POSTGREST_FORWARD_BEARER: ${DBVIZ_POSTGREST_FORWARD_BEARER:-false}
      DBVIZ_OIDC_KEYCLOAK_ISSUER: http://${DBVIZ_PUBLIC_HOST:-localhost}:8089/realms/dbviz
      DBVIZ_OIDC_KEYCLOAK_DISCOVERY_URL: http://keycloak:8080/realms/dbviz
      DBVIZ_OIDC_KEYCLOAK_CLIENT_ID: uvoo-dbviz-web
      DBVIZ_OIDC_KEYCLOAK_TENANT_CLAIM: tenant_slug
      DBVIZ_ALERTS_ENABLED: ${DBVIZ_ALERTS_ENABLED:-false}
      DBVIZ_ALERT_RULES_JSON: ${DBVIZ_ALERT_RULES_JSON:-[]}
      DBVIZ_ALERT_LOAD_PERSISTED: ${DBVIZ_ALERT_LOAD_PERSISTED:-true}
      DBVIZ_ALERT_WORKER_KEY: ${DBVIZ_ALERT_WORKER_KEY:-dev-alert-worker-key}
      DBVIZ_ALERT_POLL_SECONDS: ${DBVIZ_ALERT_POLL_SECONDS:-30}
      DBVIZ_ALERT_DEDUPE_SECONDS: ${DBVIZ_ALERT_DEDUPE_SECONDS:-300}
      DBVIZ_ALERT_SMTP_HOST: ${DBVIZ_ALERT_SMTP_HOST:-}
      DBVIZ_ALERT_SMTP_PORT: ${DBVIZ_ALERT_SMTP_PORT:-587}
      DBVIZ_ALERT_SMTP_USER: ${DBVIZ_ALERT_SMTP_USER:-}
      DBVIZ_ALERT_SMTP_FROM: ${DBVIZ_ALERT_SMTP_FROM:-}
      DBVIZ_ALERT_SMTP_PASSWORD: ${DBVIZ_ALERT_SMTP_PASSWORD:-}

  clickhouse:
    image: clickhouse/clickhouse-server:25.5-alpine
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ${DBVIZ_CLICKHOUSE_PASSWORD:-clickhouse}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "${DBVIZ_BIND_ADDR:-0.0.0.0}:${DBVIZ_CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "${DBVIZ_BIND_ADDR:-0.0.0.0}:${DBVIZ_CLICKHOUSE_NATIVE_PORT:-9000}:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "clickhouse-client", "--password", "clickhouse", "--query", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 30

  clickhouse-seed:
    image: clickhouse/clickhouse-server:25.5-alpine
    depends_on:
      clickhouse:
        condition: service_healthy
    volumes:
      - ./migrations/clickhouse:/migrations:ro
      - ./scripts/seed-clickhouse.sh:/seed-clickhouse.sh:ro
    entrypoint: ["/bin/sh", "/seed-clickhouse.sh"]
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "9000"
      CLICKHOUSE_PASSWORD: ${DBVIZ_CLICKHOUSE_PASSWORD:-clickhouse}

  otel-normalizer:
    image: clickhouse/clickhouse-server:25.5-alpine
    depends_on:
      clickhouse:
        condition: service_healthy
      otel-collector:
        condition: service_started
    volumes:
      - ./scripts/create-otel-normalizers.sh:/create-otel-normalizers.sh:ro
    entrypoint: ["/bin/sh", "/create-otel-normalizers.sh"]
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "9000"
      CLICKHOUSE_PASSWORD: ${DBVIZ_CLICKHOUSE_PASSWORD:-clickhouse}
      DBVIZ_OTEL_DEFAULT_TENANT: ${DBVIZ_OTEL_DEFAULT_TENANT:-dev}
      DBVIZ_OTEL_NORMALIZER_WAIT_SECONDS: ${DBVIZ_OTEL_NORMALIZER_WAIT_SECONDS:-90}

  postgres:
    image: postgres:17-alpine
    ports:
      - "${DBVIZ_BIND_ADDR:-0.0.0.0}:${DBVIZ_POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: dbviz
      POSTGRES_USER: dbviz
      POSTGRES_PASSWORD: dbviz
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./migrations/postgres:/docker-entrypoint-initdb.d:ro

  postgrest:
    image: postgrest/postgrest:v12.2.12
    depends_on:
      - postgres
    ports:
      - "${DBVIZ_BIND_ADDR:-0.0.0.0}:${DBVIZ_POSTGREST_PORT:-3000}:3000"
    environment:
      PGRST_DB_URI: postgres://dbviz:dbviz@postgres:5432/dbviz
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: dbviz_web
      PGRST_JWT_SECRET: "replace-this-with-your-oidc-jwk-or-proxy-jwt-secret"

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    command: ["start-dev", "--import-realm", "--http-port=8080", "--hostname=http://${DBVIZ_PUBLIC_HOST:-localhost}:8089"]
    ports:
      - "${DBVIZ_BIND_ADDR:-0.0.0.0}:${DBVIZ_KEYCLOAK_PORT:-8089}:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    volumes:
      - ./deploy/keycloak:/opt/keycloak/data/import:ro

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.128.0
    command: ["--config=/etc/otelcol/config.yaml"]
    depends_on:
      clickhouse:
        condition: service_healthy
    ports:
      - "${DBVIZ_BIND_ADDR:-0.0.0.0}:${DBVIZ_OTEL_GRPC_PORT:-4317}:4317"
      - "${DBVIZ_BIND_ADDR:-0.0.0.0}:${DBVIZ_OTEL_HTTP_PORT:-4318}:4318"
    environment:
      CLICKHOUSE_PASSWORD: ${DBVIZ_CLICKHOUSE_PASSWORD:-clickhouse}
    volumes:
      - ./deploy/otel/collector.yaml:/etc/otelcol/config.yaml:ro

  otel-sample:
    image: clickhouse/clickhouse-server:25.5-alpine
    depends_on:
      clickhouse:
        condition: service_healthy
      otel-collector:
        condition: service_started
    volumes:
      - ./scripts/sample-telemetry/emit.sh:/emit.sh:ro
      - ./scripts/create-otel-normalizers.sh:/create-otel-normalizers.sh:ro
    entrypoint: ["/bin/sh", "/emit.sh"]
    environment:
      OTEL_ENDPOINT: http://otel-collector:4318
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "9000"
      CLICKHOUSE_PASSWORD: ${DBVIZ_CLICKHOUSE_PASSWORD:-clickhouse}
      TENANT_ID: dev

volumes:
  clickhouse-data:
  postgres-data:
