services:
  uvoo-sqviz:
    image: ${SQVIZ_IMAGE:-uvoo-sqviz:local}
    build: .
    depends_on:
      clickhouse:
        condition: service_healthy
      clickhouse-seed:
        condition: service_completed_successfully
      keycloak:
        condition: service_started
      postgrest:
        condition: service_started
    ports:
      - "${SQVIZ_BIND_ADDR:-0.0.0.0}:${SQVIZ_HTTP_PORT:-8080}:8080"
    environment:
      SQVIZ_ADDR: :8080
      SQVIZ_PUBLIC_URL: http://${SQVIZ_PUBLIC_HOST:-localhost}:8080
      SQVIZ_WEB_ROOT: /app/web/dist
      SQVIZ_AUTH_DEV_MODE: ${SQVIZ_AUTH_DEV_MODE:-true}
      SQVIZ_CLICKHOUSE_URL: http://clickhouse:8123
      SQVIZ_CLICKHOUSE_PASSWORD: ${SQVIZ_CLICKHOUSE_PASSWORD:-clickhouse}
      SQVIZ_SECRET_CLICKHOUSE_DEFAULT: ${SQVIZ_CLICKHOUSE_PASSWORD:-clickhouse}
      SQVIZ_CLICKHOUSE_DATABASE: default
      SQVIZ_POSTGREST_URL: http://postgrest:3000
      SQVIZ_POSTGREST_FORWARD_BEARER: ${SQVIZ_POSTGREST_FORWARD_BEARER:-false}
      SQVIZ_OIDC_KEYCLOAK_ISSUER: http://${SQVIZ_PUBLIC_HOST:-localhost}:8089/realms/sqviz
      SQVIZ_OIDC_KEYCLOAK_DISCOVERY_URL: http://keycloak:8080/realms/sqviz
      SQVIZ_OIDC_KEYCLOAK_CLIENT_ID: uvoo-sqviz-web
      SQVIZ_OIDC_KEYCLOAK_TENANT_CLAIM: tenant_slug
      SQVIZ_ALERTS_ENABLED: ${SQVIZ_ALERTS_ENABLED:-false}
      SQVIZ_ALERT_RULES_JSON: ${SQVIZ_ALERT_RULES_JSON:-[]}
      SQVIZ_ALERT_LOAD_PERSISTED: ${SQVIZ_ALERT_LOAD_PERSISTED:-true}
      SQVIZ_ALERT_WORKER_KEY: ${SQVIZ_ALERT_WORKER_KEY:-dev-alert-worker-key}
      SQVIZ_ALERT_POLL_SECONDS: ${SQVIZ_ALERT_POLL_SECONDS:-30}
      SQVIZ_ALERT_DEDUPE_SECONDS: ${SQVIZ_ALERT_DEDUPE_SECONDS:-300}
      SQVIZ_ALERT_SMTP_HOST: ${SQVIZ_ALERT_SMTP_HOST:-}
      SQVIZ_ALERT_SMTP_PORT: ${SQVIZ_ALERT_SMTP_PORT:-587}
      SQVIZ_ALERT_SMTP_USER: ${SQVIZ_ALERT_SMTP_USER:-}
      SQVIZ_ALERT_SMTP_FROM: ${SQVIZ_ALERT_SMTP_FROM:-}
      SQVIZ_ALERT_SMTP_PASSWORD: ${SQVIZ_ALERT_SMTP_PASSWORD:-}
      SQVIZ_SECRETS_ENCRYPTION_KEY: ${SQVIZ_SECRETS_ENCRYPTION_KEY:-dev-local-test-secret-key}

  clickhouse:
    image: clickhouse/clickhouse-server:25.5-alpine
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ${SQVIZ_CLICKHOUSE_PASSWORD:-clickhouse}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "${SQVIZ_BIND_ADDR:-0.0.0.0}:${SQVIZ_CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "${SQVIZ_BIND_ADDR:-0.0.0.0}:${SQVIZ_CLICKHOUSE_NATIVE_PORT:-9000}:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "clickhouse-client", "--password", "clickhouse", "--query", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 30

  clickhouse-seed:
    image: clickhouse/clickhouse-server:25.5-alpine
    depends_on:
      clickhouse:
        condition: service_healthy
    volumes:
      - ./migrations/clickhouse:/migrations:ro
      - ./scripts/seed-clickhouse.sh:/seed-clickhouse.sh:ro
    entrypoint: ["/bin/sh", "/seed-clickhouse.sh"]
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "9000"
      CLICKHOUSE_PASSWORD: ${SQVIZ_CLICKHOUSE_PASSWORD:-clickhouse}

  otel-normalizer:
    image: clickhouse/clickhouse-server:25.5-alpine
    depends_on:
      clickhouse:
        condition: service_healthy
      otel-collector:
        condition: service_started
    volumes:
      - ./scripts/create-otel-normalizers.sh:/create-otel-normalizers.sh:ro
    entrypoint: ["/bin/sh", "/create-otel-normalizers.sh"]
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "9000"
      CLICKHOUSE_PASSWORD: ${SQVIZ_CLICKHOUSE_PASSWORD:-clickhouse}
      SQVIZ_OTEL_DEFAULT_TENANT: ${SQVIZ_OTEL_DEFAULT_TENANT:-dev}
      SQVIZ_OTEL_NORMALIZER_WAIT_SECONDS: ${SQVIZ_OTEL_NORMALIZER_WAIT_SECONDS:-90}

  postgres:
    image: postgres:17-alpine
    ports:
      - "${SQVIZ_BIND_ADDR:-0.0.0.0}:${SQVIZ_POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: sqviz
      POSTGRES_USER: sqviz
      POSTGRES_PASSWORD: sqviz
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./migrations/postgres:/docker-entrypoint-initdb.d:ro

  postgrest:
    image: postgrest/postgrest:v12.2.12
    depends_on:
      - postgres
    ports:
      - "${SQVIZ_BIND_ADDR:-0.0.0.0}:${SQVIZ_POSTGREST_PORT:-3000}:3000"
    environment:
      PGRST_DB_URI: postgres://sqviz:sqviz@postgres:5432/sqviz
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: sqviz_web
      PGRST_JWT_SECRET: "replace-this-with-your-oidc-jwk-or-proxy-jwt-secret"

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    command: ["start-dev", "--import-realm", "--http-port=8080", "--hostname=http://${SQVIZ_PUBLIC_HOST:-localhost}:8089"]
    ports:
      - "${SQVIZ_BIND_ADDR:-0.0.0.0}:${SQVIZ_KEYCLOAK_PORT:-8089}:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    volumes:
      - ./deploy/keycloak:/opt/keycloak/data/import:ro

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.128.0
    command: ["--config=/etc/otelcol/config.yaml"]
    depends_on:
      clickhouse:
        condition: service_healthy
    ports:
      - "${SQVIZ_BIND_ADDR:-0.0.0.0}:${SQVIZ_OTEL_GRPC_PORT:-4317}:4317"
      - "${SQVIZ_BIND_ADDR:-0.0.0.0}:${SQVIZ_OTEL_HTTP_PORT:-4318}:4318"
    environment:
      CLICKHOUSE_PASSWORD: ${SQVIZ_CLICKHOUSE_PASSWORD:-clickhouse}
    volumes:
      - ./deploy/otel/collector.yaml:/etc/otelcol/config.yaml:ro

  otel-sample:
    image: clickhouse/clickhouse-server:25.5-alpine
    depends_on:
      clickhouse:
        condition: service_healthy
      otel-collector:
        condition: service_started
    volumes:
      - ./scripts/sample-telemetry/emit.sh:/emit.sh:ro
      - ./scripts/create-otel-normalizers.sh:/create-otel-normalizers.sh:ro
    entrypoint: ["/bin/sh", "/emit.sh"]
    environment:
      OTEL_ENDPOINT: http://otel-collector:4318
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "9000"
      CLICKHOUSE_PASSWORD: ${SQVIZ_CLICKHOUSE_PASSWORD:-clickhouse}
      TENANT_ID: dev

volumes:
  clickhouse-data:
  postgres-data:
