replicaCount: 1

image:
  repository: ghcr.io/jeremybusk/uvoo-sqviz
  pullPolicy: Always
  tag: latest

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podSecurityContext:
  fsGroup: 10001
  fsGroupChangePolicy: OnRootMismatch

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsGroup: 10001
  runAsNonRoot: true
  runAsUser: 10001

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

config:
  environment: development
  requireProductionSafe: false
  allowInsecureDefaults: false
  authDevMode: false
  publicUrl: ""
  postgrestUrl: ""
  postgrestForwardBearer: false
  clickhouseUrl: ""
  clickhouseDatabase: default
  clickhouseUser: default
  googleClientId: ""
  microsoftClientId: ""
  keycloakIssuer: ""
  keycloakDiscoveryUrl: ""
  keycloakClientId: ""
  keycloakTenantClaim: tenant_slug
  alertsEnabled: false
  alertRulesJson: "[]"
  alertLoadPersisted: false
  alertWorkerKey: ""
  alertPollSeconds: "30"
  alertDedupeSeconds: "300"
  alertSmtpHost: ""
  alertSmtpPort: "587"
  alertSmtpUser: ""
  alertSmtpFrom: ""
  extraEnv: []

secret:
  clickhousePassword: "clickhouse"
  clickhouseDefaultSecret: "clickhouse"
  postgresPassword: "sqviz"
  postgrestJwtSecret: "replace-this-with-your-oidc-jwk-or-proxy-jwt-secret"
  keycloakAdminPassword: "admin"
  keycloakClientSecret: ""
  alertSmtpPassword: ""
  secretsEncryptionKey: ""
  existingSecret: ""

clickhouse:
  enabled: true
  image: clickhouse/clickhouse-server:25.5-alpine
  storageSize: 10Gi
  storageClass: ""
  seed:
    enabled: true

demo:
  enabled: false
  tenant: dev
  postgres:
    enabled: true
    image: postgres:17-alpine
    storageSize: 5Gi
    storageClass: ""
  postgrest:
    enabled: true
    image: postgrest/postgrest:v12.2.12
  keycloak:
    enabled: true
    image: quay.io/keycloak/keycloak:25.0
    adminUsername: admin
    hostname: ""
    service:
      type: ClusterIP
      port: 8080
    ingress:
      enabled: false
      className: nginx
      annotations: {}
      host: keycloak.sqviz.example.com
      path: /
      pathType: Prefix
      tls:
        enabled: false
        secretName: ""
  otelCollector:
    enabled: true
    image: otel/opentelemetry-collector-contrib:0.128.0
    service:
      type: ClusterIP
      grpcPort: 4317
      httpPort: 4318

ingress:
  enabled: false
  className: nginx
  annotations: {}
  host: sqviz.example.com
  path: /
  pathType: Prefix
  tls:
    enabled: false
    secretName: ""

resources: {}
nodeSelector: {}
tolerations: []
affinity: {}

probes:
  liveness:
    enabled: true
    initialDelaySeconds: 20
    periodSeconds: 20
  readiness:
    enabled: true
    initialDelaySeconds: 5
    periodSeconds: 10
