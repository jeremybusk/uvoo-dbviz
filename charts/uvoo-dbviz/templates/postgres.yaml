{{- if and .Values.demo.enabled .Values.demo.postgres.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "uvoo-sqviz.postgresName" . }}-init
  labels:
    {{- include "uvoo-sqviz.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
data:
  001_init.sql: |
{{ tpl (.Files.Get "files/postgres/001_init.sql") . | indent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "uvoo-sqviz.postgresName" . }}
  labels:
    {{- include "uvoo-sqviz.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
  selector:
    app.kubernetes.io/name: {{ include "uvoo-sqviz.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "uvoo-sqviz.postgresName" . }}
  labels:
    {{- include "uvoo-sqviz.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  serviceName: {{ include "uvoo-sqviz.postgresName" . }}
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "uvoo-sqviz.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "uvoo-sqviz.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: postgres
    spec:
      containers:
        - name: postgres
          image: {{ .Values.demo.postgres.image | quote }}
          env:
            - name: POSTGRES_DB
              value: sqviz
            - name: POSTGRES_USER
              value: sqviz
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ default (include "uvoo-sqviz.fullname" .) .Values.secret.existingSecret }}
                  key: SQVIZ_POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - name: postgres
              containerPort: 5432
          startupProbe:
            exec:
              command: ["pg_isready", "-h", "127.0.0.1", "-U", "sqviz", "-d", "sqviz"]
            failureThreshold: 30
            periodSeconds: 5
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-h", "127.0.0.1", "-U", "sqviz", "-d", "sqviz"]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command: ["pg_isready", "-h", "127.0.0.1", "-U", "sqviz", "-d", "sqviz"]
            periodSeconds: 5
            timeoutSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
      volumes:
        - name: init
          configMap:
            name: {{ include "uvoo-sqviz.postgresName" . }}-init
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.demo.postgres.storageClass }}
        storageClassName: {{ .Values.demo.postgres.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.demo.postgres.storageSize }}
{{- end }}
