{{- include "uvoo-sqviz.validateValues" . -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "uvoo-sqviz.fullname" . }}
  labels:
    {{- include "uvoo-sqviz.labels" . | nindent 4 }}
data:
  SQVIZ_ADDR: ":8080"
  SQVIZ_WEB_ROOT: "/app/web/dist"
  SQVIZ_ENV: {{ .Values.config.environment | quote }}
  SQVIZ_REQUIRE_PRODUCTION_SAFE: {{ .Values.config.requireProductionSafe | quote }}
  SQVIZ_ALLOW_INSECURE_DEFAULTS: {{ .Values.config.allowInsecureDefaults | quote }}
  SQVIZ_AUTH_DEV_MODE: {{ .Values.config.authDevMode | quote }}
  SQVIZ_PUBLIC_URL: {{ include "uvoo-sqviz.publicURL" . | quote }}
  SQVIZ_CLICKHOUSE_URL: {{ include "uvoo-sqviz.clickhouseURL" . | quote }}
  SQVIZ_CLICKHOUSE_DATABASE: {{ .Values.config.clickhouseDatabase | quote }}
  SQVIZ_CLICKHOUSE_USER: {{ .Values.config.clickhouseUser | quote }}
  SQVIZ_POSTGREST_URL: {{ include "uvoo-sqviz.postgrestURL" . | quote }}
  SQVIZ_POSTGREST_FORWARD_BEARER: {{ .Values.config.postgrestForwardBearer | quote }}
  SQVIZ_OIDC_GOOGLE_CLIENT_ID: {{ .Values.config.googleClientId | quote }}
  SQVIZ_OIDC_MICROSOFT_CLIENT_ID: {{ .Values.config.microsoftClientId | quote }}
  SQVIZ_OIDC_KEYCLOAK_ISSUER: {{ include "uvoo-sqviz.keycloakIssuer" . | quote }}
  SQVIZ_OIDC_KEYCLOAK_DISCOVERY_URL: {{ include "uvoo-sqviz.keycloakDiscoveryURL" . | quote }}
  SQVIZ_OIDC_KEYCLOAK_CLIENT_ID: {{ include "uvoo-sqviz.keycloakClientId" . | quote }}
  SQVIZ_OIDC_KEYCLOAK_TENANT_CLAIM: {{ .Values.config.keycloakTenantClaim | quote }}
  SQVIZ_ALERTS_ENABLED: {{ .Values.config.alertsEnabled | quote }}
  SQVIZ_ALERT_RULES_JSON: {{ .Values.config.alertRulesJson | quote }}
  SQVIZ_ALERT_LOAD_PERSISTED: {{ .Values.config.alertLoadPersisted | quote }}
  SQVIZ_ALERT_WORKER_KEY: {{ .Values.config.alertWorkerKey | quote }}
  SQVIZ_ALERT_POLL_SECONDS: {{ .Values.config.alertPollSeconds | quote }}
  SQVIZ_ALERT_DEDUPE_SECONDS: {{ .Values.config.alertDedupeSeconds | quote }}
  SQVIZ_ALERT_SMTP_HOST: {{ .Values.config.alertSmtpHost | quote }}
  SQVIZ_ALERT_SMTP_PORT: {{ .Values.config.alertSmtpPort | quote }}
  SQVIZ_ALERT_SMTP_USER: {{ .Values.config.alertSmtpUser | quote }}
  SQVIZ_ALERT_SMTP_FROM: {{ .Values.config.alertSmtpFrom | quote }}
