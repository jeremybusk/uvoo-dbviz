{{- if and .Values.demo.enabled .Values.demo.otelCollector.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "uvoo-sqviz.otelCollectorName" . }}
  labels:
    {{- include "uvoo-sqviz.labels" . | nindent 4 }}
    app.kubernetes.io/component: otel-collector
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          http:
            endpoint: 0.0.0.0:4318
          grpc:
            endpoint: 0.0.0.0:4317

    processors:
      batch:
        timeout: 2s

    exporters:
      clickhouse:
        endpoint: tcp://{{ include "uvoo-sqviz.fullname" . }}-clickhouse:9000?dial_timeout=10s
        database: {{ .Values.config.clickhouseDatabase }}
        username: {{ .Values.config.clickhouseUser }}
        password: ${env:CLICKHOUSE_PASSWORD}
        create_schema: true
        logs_table_name: otelcol_logs
        traces_table_name: otelcol_traces
        metrics_tables:
          gauge:
            name: otelcol_metrics_gauge
          sum:
            name: otelcol_metrics_sum
          summary:
            name: otelcol_metrics_summary
          histogram:
            name: otelcol_metrics_histogram
          exponential_histogram:
            name: otelcol_metrics_exp_histogram
        timeout: 5s

    service:
      pipelines:
        logs:
          receivers: [otlp]
          processors: [batch]
          exporters: [clickhouse]
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [clickhouse]
        metrics:
          receivers: [otlp]
          processors: [batch]
          exporters: [clickhouse]
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "uvoo-sqviz.otelCollectorName" . }}
  labels:
    {{- include "uvoo-sqviz.labels" . | nindent 4 }}
    app.kubernetes.io/component: otel-collector
spec:
  type: {{ .Values.demo.otelCollector.service.type }}
  ports:
    - name: otlp-grpc
      port: {{ .Values.demo.otelCollector.service.grpcPort }}
      targetPort: otlp-grpc
    - name: otlp-http
      port: {{ .Values.demo.otelCollector.service.httpPort }}
      targetPort: otlp-http
  selector:
    app.kubernetes.io/name: {{ include "uvoo-sqviz.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: otel-collector
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "uvoo-sqviz.otelCollectorName" . }}
  labels:
    {{- include "uvoo-sqviz.labels" . | nindent 4 }}
    app.kubernetes.io/component: otel-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "uvoo-sqviz.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: otel-collector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "uvoo-sqviz.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: otel-collector
    spec:
      containers:
        - name: otel-collector
          image: {{ .Values.demo.otelCollector.image | quote }}
          args: ["--config=/etc/otelcol/config.yaml"]
          env:
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ default (include "uvoo-sqviz.fullname" .) .Values.secret.existingSecret }}
                  key: SQVIZ_CLICKHOUSE_PASSWORD
          ports:
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
          volumeMounts:
            - name: config
              mountPath: /etc/otelcol
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: {{ include "uvoo-sqviz.otelCollectorName" . }}
{{- end }}
