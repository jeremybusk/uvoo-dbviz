{{- if and .Values.demo.enabled .Values.demo.postgrest.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "uvoo-sqviz.postgrestName" . }}
  labels:
    {{- include "uvoo-sqviz.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgrest
spec:
  ports:
    - name: http
      port: 3000
      targetPort: http
  selector:
    app.kubernetes.io/name: {{ include "uvoo-sqviz.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: postgrest
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "uvoo-sqviz.postgrestName" . }}
  labels:
    {{- include "uvoo-sqviz.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgrest
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "uvoo-sqviz.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: postgrest
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "uvoo-sqviz.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: postgrest
    spec:
      {{- if .Values.demo.postgres.enabled }}
      initContainers:
        - name: wait-for-postgres
          image: {{ .Values.demo.postgres.image | quote }}
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ default (include "uvoo-sqviz.fullname" .) .Values.secret.existingSecret }}
                  key: SQVIZ_POSTGRES_PASSWORD
          command:
            - /bin/sh
            - -c
            - |
              until pg_isready -h {{ include "uvoo-sqviz.postgresName" . }} -U sqviz -d sqviz; do
                sleep 2
              done
      {{- end }}
      containers:
        - name: postgrest
          image: {{ .Values.demo.postgrest.image | quote }}
          env:
            - name: PGRST_DB_URI
              valueFrom:
                secretKeyRef:
                  name: {{ default (include "uvoo-sqviz.fullname" .) .Values.secret.existingSecret }}
                  key: PGRST_DB_URI
            - name: PGRST_DB_SCHEMA
              value: public
            - name: PGRST_DB_ANON_ROLE
              value: sqviz_web
            - name: PGRST_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ default (include "uvoo-sqviz.fullname" .) .Values.secret.existingSecret }}
                  key: SQVIZ_POSTGREST_JWT_SECRET
          ports:
            - name: http
              containerPort: 3000
          startupProbe:
            httpGet:
              path: /
              port: http
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
{{- end }}
