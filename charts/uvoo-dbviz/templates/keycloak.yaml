{{- if and .Values.demo.enabled .Values.demo.keycloak.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "uvoo-sqviz.keycloakName" . }}-realm
  labels:
    {{- include "uvoo-sqviz.labels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak
data:
  dbviz-realm.json: |
{{ .Files.Get "files/keycloak/dbviz-realm.json" | indent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "uvoo-sqviz.keycloakName" . }}
  labels:
    {{- include "uvoo-sqviz.labels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak
spec:
  type: {{ .Values.demo.keycloak.service.type }}
  ports:
    - name: http
      port: {{ .Values.demo.keycloak.service.port }}
      targetPort: http
  selector:
    app.kubernetes.io/name: {{ include "uvoo-sqviz.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: keycloak
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "uvoo-sqviz.keycloakName" . }}
  labels:
    {{- include "uvoo-sqviz.labels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "uvoo-sqviz.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: keycloak
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "uvoo-sqviz.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: keycloak
    spec:
      containers:
        - name: keycloak
          image: {{ .Values.demo.keycloak.image | quote }}
          args:
            - start-dev
            - --import-realm
            - --http-port=8080
            {{- if .Values.demo.keycloak.hostname }}
            - --hostname={{ .Values.demo.keycloak.hostname }}
            {{- end }}
          env:
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              value: {{ .Values.demo.keycloak.adminUsername | quote }}
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ default (include "uvoo-sqviz.fullname" .) .Values.secret.existingSecret }}
                  key: SQVIZ_KEYCLOAK_ADMIN_PASSWORD
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /realms/sqviz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          volumeMounts:
            - name: realm
              mountPath: /opt/keycloak/data/import
              readOnly: true
      volumes:
        - name: realm
          configMap:
            name: {{ include "uvoo-sqviz.keycloakName" . }}-realm
{{- end }}
