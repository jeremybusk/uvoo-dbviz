{{- if .Values.clickhouse.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "uvoo-sqviz.fullname" . }}-clickhouse
  labels:
    {{- include "uvoo-sqviz.labels" . | nindent 4 }}
    app.kubernetes.io/component: clickhouse
spec:
  ports:
    - name: http
      port: 8123
      targetPort: http
    - name: native
      port: 9000
      targetPort: native
  selector:
    app.kubernetes.io/name: {{ include "uvoo-sqviz.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: clickhouse
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "uvoo-sqviz.fullname" . }}-clickhouse
  labels:
    {{- include "uvoo-sqviz.labels" . | nindent 4 }}
    app.kubernetes.io/component: clickhouse
spec:
  serviceName: {{ include "uvoo-sqviz.fullname" . }}-clickhouse
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "uvoo-sqviz.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: clickhouse
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "uvoo-sqviz.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: clickhouse
    spec:
      containers:
        - name: clickhouse
          image: {{ .Values.clickhouse.image | quote }}
          env:
            - name: CLICKHOUSE_USER
              value: "default"
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ default (include "uvoo-sqviz.fullname" .) .Values.secret.existingSecret }}
                  key: SQVIZ_CLICKHOUSE_PASSWORD
            - name: CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT
              value: "1"
          ports:
            - name: http
              containerPort: 8123
            - name: native
              containerPort: 9000
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /var/lib/clickhouse
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.clickhouse.storageClass }}
        storageClassName: {{ .Values.clickhouse.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.clickhouse.storageSize }}
{{- end }}
