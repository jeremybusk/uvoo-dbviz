name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Existing tag to package, for example v0.1.0
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install Helm
        uses: azure/setup-helm@v4
      - name: Test
        run: make test
      - name: Helm lint
        run: make helm-lint
      - name: Build release assets
        env:
          VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
        run: |
          rm -rf dist
          make package
          make helm-package
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
        run: |
          gh release create "$VERSION" dist/*.tar.gz dist/*.tgz dist/checksums.txt \
            --title "uvoo-sqviz $VERSION" \
            --notes "Release $VERSION" \
            --verify-tag
